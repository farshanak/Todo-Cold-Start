services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    container_name: todo_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      CORS_ORIGINS: "http://localhost:5500,http://127.0.0.1:5500"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    container_name: todo_frontend
    ports:
      - "5500:5500"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5500/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
