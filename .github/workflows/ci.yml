name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Ruff (Python)
        run: ruff check backend

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node deps
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Test with coverage (full suite, enforces 80% threshold)
        run: pytest --cov=backend --cov-report=term-missing --cov-fail-under=80

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Integration tests (no threshold; report coverage only)
        run: pytest backend/tests/integration -m integration --cov=backend --cov-report=term-missing

  validate-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            deps
            ci
            style
            perf
          requireScope: false

  validate-branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feat|fix|docs|chore|refactor|test|deps|ci|step[0-9]+)/"
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" || "$BRANCH" == "develop" ]]; then
            echo "Default branch — skipping validation"
            exit 0
          fi
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "::error::Invalid branch name: $BRANCH"
            echo "Branch must match: feat/ fix/ docs/ chore/ refactor/ test/ deps/ ci/ stepN/"
            exit 1
          fi
          echo "Branch name valid: $BRANCH"
