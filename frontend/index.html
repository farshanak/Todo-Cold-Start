<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Todos</title>
    <style>
      body { font: 16px system-ui; max-width: 480px; margin: 2rem auto; }
      ul { list-style: none; padding: 0; }
      li { display: flex; gap: .5rem; align-items: center; padding: .25rem 0; }
      .done { text-decoration: line-through; opacity: .6; }
      input[type=text] { flex: 1; padding: .4rem; }
      form { display: flex; gap: .5rem; }
    </style>
  </head>
  <body>
    <h1>Todos</h1>
    <form id="new-form">
      <input id="new-input" type="text" placeholder="What needs doing?" required />
      <button type="submit">Add</button>
    </form>
    <ul id="list"></ul>
    <script type="module" src="./app.js"></script>
  </body>
</html>
